<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote — Congregational Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:         #1a2744;
      --navy-mid:     #243460;
      --gold:         #b8942a;
      --gold-light:   #d4aa3a;
      --motion:       #4a1a7c;
      --motion-mid:   #5d2299;
      --motion-tint:  #f5eefa;
      --motion-border:#c8a0e8;
      --green:        #2d6a4f;
      --red:          #9b2335;
      --text:         #1a2744;
      --text-muted:   #5a6787;
      --border:       #dce3ef;
    }

    html, body {
      min-height: 100%;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      background: var(--navy);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    /* ── Card ─────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 2px 8px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    /* ── Card Header ──────────────────────────────── */
    .card-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      padding: 24px 24px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-cross { flex-shrink: 0; opacity: 0.85; }
    .header-text  { flex: 1; min-width: 0; }

    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .status-pill {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .pill-open   { background: #d4edda; color: #155724; }
    .pill-closed { background: #f8d7da; color: #721c24; }
    .pill-none   { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); }

    /* ── Card Body ────────────────────────────────── */
    .card-body { padding: 28px 24px 32px; }

    /* ── Typography ───────────────────────────────── */
    .heading {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }
    .subtext {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* ── Token Input ──────────────────────────────── */
    .token-wrap { margin-bottom: 16px; }

    .token-input {
      width: 100%;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: 12px;
      text-align: center;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--navy);
      background: #f8f9fb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-height: 70px;
      -moz-appearance: textfield;
    }
    .token-input::-webkit-inner-spin-button,
    .token-input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .token-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,148,42,0.18);
      background: #fff;
    }
    .token-input.input-error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(155,35,53,0.12);
    }

    /* ── Error / Info ─────────────────────────────── */
    .error-msg {
      display: none;
      background: #fdf0f2;
      border: 1px solid #f5c2c7;
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .error-msg.visible { display: block; }

    /* ── Buttons ──────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
      letter-spacing: 0.2px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-navy {
      background: var(--navy);
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,39,68,0.25);
    }
    .btn-navy:hover { background: var(--navy-mid); }
    .btn-motion {
      background: var(--motion);
      color: #fff;
      box-shadow: 0 2px 8px rgba(74,26,124,0.3);
    }
    .btn-motion:hover { background: var(--motion-mid); }
    .btn-motion:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent;
      color: var(--navy);
      border: 2px solid var(--border);
    }
    .btn-outline:hover { background: #f4f6fb; }

    /* ── Motion Badge ─────────────────────────────── */
    .motion-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      background: var(--motion-tint);
      color: var(--motion);
      border: 1px solid var(--motion-border);
    }

    /* ── Question Card ────────────────────────────── */
    .question-card {
      background: #f8f6f1;
      border-left: 4px solid var(--gold);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 20px;
    }
    .question-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }
    .question-text {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      color: var(--navy);
      line-height: 1.45;
    }

    /* ── Answer Options ───────────────────────────── */
    .answers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }

    .answer-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: #fff;
      user-select: none;
    }
    .answer-row:hover { border-color: var(--motion-border); background: var(--motion-tint); }
    .answer-row.selected { border-color: var(--motion); background: var(--motion-tint); }

    .answer-radio {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .answer-row.selected .answer-radio {
      border-color: var(--motion);
      background: var(--motion);
    }
    .answer-radio-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #fff;
      display: none;
    }
    .answer-row.selected .answer-radio-dot { display: block; }
    .answer-label { font-size: 16px; font-weight: 500; color: var(--navy); flex: 1; }
    .answer-row.selected .answer-label { color: var(--motion); font-weight: 600; }

    /* ── Icon circles ────────────────────────────── */
    .icon-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
    .icon-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-circle-gold  { background: #fdf6e3; }
    .icon-circle-navy  { background: #e8eaf2; }
    .icon-circle-green { background: #e8f5e9; }
    .icon-circle-purple{ background: var(--motion-tint); }

    /* ── Divider ──────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 360px) {
      .card-body { padding: 20px 16px 24px; }
      .heading   { font-size: 19px; }
      .token-input { font-size: 28px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>

<div class="card" id="app">
  <!-- Rendered by JS -->
</div>

<script>
(function () {
  'use strict';

  // ── Constants ────────────────────────────────────────
  const STORAGE_KEY = 'frc_election_v3';

  const defaultState = {
    church: '',
    meetingDate: '',
    expectedVoters: 100,
    tokens: [],
    motion: {
      question: '',
      answers: [],
      votingOpen: false,
      complete: false,
      votes: {},
      ballots: [],
      expectedVoters: 0
    }
  };

  // ── State ────────────────────────────────────────────
  let state        = {};
  let enteredToken = '';
  let selectedAnswer = null;
  let view         = 'token'; // token | ballot | done | waiting | no-motion | complete | already-voted
  let waitingPoller = null;

  // ── Storage ──────────────────────────────────────────
  function deepMerge(target, source) {
    const out = { ...target };
    for (const key of Object.keys(source)) {
      if (
        source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key]) &&
        target[key] !== null && typeof target[key] === 'object' && !Array.isArray(target[key])
      ) {
        out[key] = deepMerge(target[key], source[key]);
      } else {
        out[key] = source[key];
      }
    }
    return out;
  }

  function load() {
    try {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', '/api/state', false);
      xhr.send();
      if (xhr.status === 200) {
        const parsed = JSON.parse(xhr.responseText || '{}');
        return deepMerge(defaultState, parsed);
      }
    } catch (_) {}
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { ...defaultState };
      return deepMerge(defaultState, JSON.parse(raw));
    } catch (_) {
      return { ...defaultState };
    }
  }

  // ── Helpers ──────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function getHeaderTitle() {
    return state.church ? state.church : 'Congregational Vote';
  }

  function getHeaderSubtitle() {
    if (state.meetingDate) {
      const [y, m, day] = state.meetingDate.split('-').map(Number);
      const d = new Date(y, m - 1, day);
      if (!isNaN(d)) return d.toLocaleDateString('en-ZA', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    return 'Reformed Church';
  }

  function getStatusPill() {
    const motion = state.motion || {};
    if (!motion.question) return `<span class="status-pill pill-none">No Motion</span>`;
    if (motion.votingOpen) return `<span class="status-pill pill-open">Voting Open</span>`;
    return `<span class="status-pill pill-closed">Voting Closed</span>`;
  }

  // ── SVG ──────────────────────────────────────────────
  const svgCross = `<svg class="header-cross" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="15" y="4" width="6" height="28" rx="2.5" fill="rgba(255,255,255,0.75)"/>
    <rect x="6" y="12" width="24" height="6" rx="2.5" fill="rgba(255,255,255,0.75)"/>
  </svg>`;

  // ── View determination ───────────────────────────────
  function determineView() {
    const motion = state.motion || {};
    if (motion.complete)   return 'complete';
    if (!motion.question)  return 'no-motion';
    if (!enteredToken)     return 'token';
    const tok = (state.tokens || []).find(t => t.code === enteredToken);
    if (!tok)              return 'token'; // invalid token, stay on token entry
    if (tok.motionVoted)   return 'already-voted';
    if (!motion.votingOpen) return 'waiting';
    return 'ballot';
  }

  // ── Header ───────────────────────────────────────────
  function renderHeader() {
    return `
      <div class="card-header">
        ${svgCross}
        <div class="header-text">
          <div class="header-title">${esc(getHeaderTitle())}</div>
          <div class="header-subtitle">${esc(getHeaderSubtitle())}</div>
        </div>
        ${getStatusPill()}
      </div>`;
  }

  // ── Token State ──────────────────────────────────────
  function renderTokenState() {
    return `
      ${renderHeader()}
      <div class="card-body">
        <h1 class="heading">Enter Your Voting Token</h1>
        <p class="subtext">Enter the 4-digit code from your token card to access the motion ballot.</p>
        <div class="token-wrap">
          <input
            class="token-input"
            id="tokenInput"
            type="tel"
            inputmode="numeric"
            maxlength="4"
            placeholder="••••"
            autocomplete="off"
            aria-label="4-digit voting token"
          />
        </div>
        <div class="error-msg" id="tokenError" role="alert"></div>
        <button class="btn btn-navy" id="tokenSubmit" aria-label="Submit token">
          Submit Token
        </button>
      </div>`;
  }

  // ── Ballot State ─────────────────────────────────────
  function renderBallotState() {
    const motion = state.motion || {};
    const answers = motion.answers || [];

    const rows = answers.map(answer => {
      const sel = selectedAnswer === answer;
      return `
        <div
          class="answer-row${sel ? ' selected' : ''}"
          tabindex="0"
          role="radio"
          aria-checked="${sel}"
          data-answer="${esc(answer)}"
        >
          <div class="answer-radio"><div class="answer-radio-dot"></div></div>
          <span class="answer-label">${esc(answer)}</span>
        </div>`;
    }).join('');

    return `
      ${renderHeader()}
      <div class="card-body">
        <div class="motion-badge">🗳️ Congregational Motion</div>
        <div class="question-card">
          <div class="question-label">Motion</div>
          <div class="question-text">${esc(motion.question)}</div>
        </div>
        <p style="font-size:15px;font-weight:500;color:var(--text-muted);margin-bottom:14px">Select your answer:</p>
        <div class="answers" id="answersList" role="radiogroup" aria-label="Motion answers">
          ${rows}
        </div>
        <div class="error-msg" id="ballotError" role="alert"></div>
        <button class="btn btn-motion" id="ballotSubmit"
          aria-label="Submit vote"
          ${!selectedAnswer ? 'disabled' : ''}>
          Cast My Vote
        </button>
      </div>`;
  }

  // ── Done State ───────────────────────────────────────
  function renderDoneState() {
    return `
      ${renderHeader()}
      <div class="card-body" style="text-align:center">
        <div class="icon-wrap">
          <div class="icon-circle icon-circle-green">
            <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 19.5L15.5 27L30 11" stroke="#155724" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <h1 class="heading">Vote Recorded</h1>
        <p class="subtext">Thank you — your vote on the motion has been recorded. You may close this page.</p>
      </div>`;
  }

  // ── Already Voted State ──────────────────────────────
  function renderAlreadyVotedState() {
    return `
      ${renderHeader()}
      <div class="card-body" style="text-align:center">
        <div class="icon-wrap">
          <div class="icon-circle icon-circle-purple">
            <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 19.5L15.5 27L30 11" stroke="#4a1a7c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <h1 class="heading">Already Voted</h1>
        <p class="subtext">Your vote on this motion has already been recorded. Thank you for participating.</p>
      </div>`;
  }

  // ── Waiting State ────────────────────────────────────
  function renderWaitingState() {
    const motion = state.motion || {};
    const hasQuestion = !!motion.question;
    const title   = hasQuestion ? 'Voting Not Yet Open' : 'Standing By';
    const message = hasQuestion
      ? 'Voting for this motion has not yet opened. Please wait for the chairman to open the vote.'
      : 'No motion has been configured yet. Please wait for the chairman.';
    return `
      ${renderHeader()}
      <div class="card-body" style="text-align:center">
        <div class="icon-wrap">
          <div class="icon-circle icon-circle-gold">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M10 6h20M10 34h20M12 6c0 8 8 14 8 14s-8 6-8 14M28 6c0 8-8 14-8 14s8 6 8 14" stroke="#b8942a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <h1 class="heading">${title}</h1>
        <p class="subtext">${message}</p>
        ${hasQuestion ? `<div class="question-card" style="margin-top:8px;margin-bottom:0;text-align:left">
          <div class="question-label">Motion</div>
          <div class="question-text">${esc(motion.question)}</div>
        </div>` : ''}
      </div>`;
  }

  // ── No Motion State ──────────────────────────────────
  function renderNoMotionState() {
    return `
      ${renderHeader()}
      <div class="card-body" style="text-align:center">
        <div class="icon-wrap">
          <div class="icon-circle icon-circle-navy">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="7" y="5" width="26" height="32" rx="3" stroke="#5a6787" stroke-width="2.5" fill="none"/>
              <path d="M13 14h14M13 20h10M13 26h7" stroke="#5a6787" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
        <h1 class="heading">No Motion Configured</h1>
        <p class="subtext">No motion has been set up for voting yet. Please wait for the chairman.</p>
      </div>`;
  }

  // ── Complete State ───────────────────────────────────
  function renderCompleteState() {
    const motion = state.motion || {};
    return `
      ${renderHeader()}
      <div class="card-body" style="text-align:center">
        <div class="icon-wrap">
          <div class="icon-circle icon-circle-gold">
            <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="19" cy="19" r="15" stroke="#b8942a" stroke-width="2.5" fill="none"/>
              <path d="M12 19.5L17 24.5L26 14" stroke="#b8942a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <h1 class="heading">Motion Vote Complete</h1>
        <p class="subtext">The vote on this motion is now closed. Thank you for participating.</p>
        ${motion.question ? `<div class="question-card" style="margin-top:8px;margin-bottom:0;text-align:left">
          <div class="question-label">Motion</div>
          <div class="question-text">${esc(motion.question)}</div>
        </div>` : ''}
      </div>`;
  }

  // ── Render ───────────────────────────────────────────
  function render() {
    const app = document.getElementById('app');
    if (!app) return;

    switch (view) {
      case 'token':        app.innerHTML = renderTokenState();     attachTokenListeners();    break;
      case 'ballot':       app.innerHTML = renderBallotState();    attachBallotListeners();   break;
      case 'done':         app.innerHTML = renderDoneState();                                 break;
      case 'already-voted':app.innerHTML = renderAlreadyVotedState();                        break;
      case 'waiting':      app.innerHTML = renderWaitingState();                              break;
      case 'no-motion':    app.innerHTML = renderNoMotionState();                             break;
      case 'complete':     app.innerHTML = renderCompleteState();                             break;
    }
  }

  // ── Token Listeners ──────────────────────────────────
  function attachTokenListeners() {
    const input  = document.getElementById('tokenInput');
    const submit = document.getElementById('tokenSubmit');
    const errEl  = document.getElementById('tokenError');

    if (input) {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '').slice(0, 4);
        input.classList.remove('input-error');
        if (errEl) { errEl.classList.remove('visible'); errEl.textContent = ''; }
      });
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submitToken(); });
      setTimeout(() => input.focus(), 80);
    }
    if (submit) submit.addEventListener('click', submitToken);
  }

  function submitToken() {
    const input = document.getElementById('tokenInput');
    const errEl = document.getElementById('tokenError');
    const code  = (input?.value || '').trim();

    if (code.length !== 4) {
      if (input) input.classList.add('input-error');
      if (errEl) { errEl.textContent = 'Please enter your 4-digit token code.'; errEl.classList.add('visible'); }
      return;
    }

    state = load(); // refresh state
    const tok = (state.tokens || []).find(t => t.code === code);
    if (!tok) {
      if (input) input.classList.add('input-error');
      if (errEl) { errEl.textContent = 'Token not recognised. Please check your code and try again.'; errEl.classList.add('visible'); }
      return;
    }

    enteredToken = code;
    view = determineView();
    render();
    startWaitingPoller();
  }

  // ── Ballot Listeners ─────────────────────────────────
  function attachBallotListeners() {
    const list   = document.getElementById('answersList');
    const submit = document.getElementById('ballotSubmit');

    if (list) {
      list.addEventListener('click', e => {
        const row = e.target.closest('.answer-row');
        if (!row) return;
        selectedAnswer = row.dataset.answer;
        // Re-render ballot section only
        const motion  = state.motion || {};
        const answers = motion.answers || [];
        answers.forEach(answer => {
          const el = list.querySelector(`[data-answer="${CSS.escape(answer)}"]`);
          if (el) el.classList.toggle('selected', answer === selectedAnswer);
        });
        if (submit) submit.disabled = false;
      });
      list.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          const row = e.target.closest('.answer-row');
          if (row) row.click();
        }
      });
    }
    if (submit) submit.addEventListener('click', handleVoteSubmit);
  }

  function handleVoteSubmit() {
    const errEl  = document.getElementById('ballotError');
    const submit = document.getElementById('ballotSubmit');

    if (!selectedAnswer) {
      if (errEl) { errEl.textContent = 'Please select an answer before submitting.'; errEl.classList.add('visible'); }
      return;
    }

    if (submit) { submit.disabled = true; submit.textContent = 'Submitting…'; }

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/motion-ballot', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = () => {
      if (xhr.status === 200) {
        view = 'done';
        render();
        stopWaitingPoller();
      } else {
        let msg = 'Submission failed. Please try again.';
        try { msg = JSON.parse(xhr.responseText).error || msg; } catch (_) {}
        if (errEl) { errEl.textContent = msg; errEl.classList.add('visible'); }
        if (submit) { submit.disabled = false; submit.textContent = 'Cast My Vote'; }
      }
    };
    xhr.onerror = () => {
      if (errEl) { errEl.textContent = 'Network error. Please try again.'; errEl.classList.add('visible'); }
      if (submit) { submit.disabled = false; submit.textContent = 'Cast My Vote'; }
    };
    xhr.send(JSON.stringify({ tokenCode: enteredToken, answer: selectedAnswer }));
  }

  // ── Waiting Poller ───────────────────────────────────
  function startWaitingPoller() {
    stopWaitingPoller();
    if (['done', 'ballot'].includes(view)) return; // no polling needed
    waitingPoller = setInterval(() => {
      state = load();
      const newView = determineView();
      if (newView !== view) {
        view = newView;
        render();
        if (['done', 'ballot'].includes(view)) stopWaitingPoller();
      }
    }, 3000);
  }

  function stopWaitingPoller() {
    if (waitingPoller) { clearInterval(waitingPoller); waitingPoller = null; }
  }

  // ── Init ─────────────────────────────────────────────
  state = load();
  view  = determineView();
  render();
  startWaitingPoller();

}());
</script>
</body>
</html>

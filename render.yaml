# Render.com Blueprint — Voting App Platform Admin Service
#
# This deploys the ADMIN management interface only.
# Tenant instances are provisioned automatically via the admin UI (Render API).
#
# Deploy steps:
#   1. Push this repo to GitHub (johanbroersma/Voting-App-Platform).
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect this repository — Render reads this file automatically.
#   4. Click "Apply". The admin service is created in ~2 minutes.
#   5. Set the required environment variables in the Render dashboard (see below).
#
# Required env vars (set in Render dashboard after deploy):
#   ADMIN_PASSWORD_HASH   SHA-256 hex of your chosen admin password
#   RENDER_API_KEY        rnd_raKiCDtSOFkJ33EH0Y20OZwZqtvA
#   RENDER_OWNER_ID       tea-d79e9vk50q8c73fhoeng
#   RESEND_API_KEY        re_LSwxxigy_KCXdicomkSgRvV8JXCTF2J3B
#   GITHUB_REPO           https://github.com/johanbroersma/Voting-App-Platform
#   EMAIL_FROM            noreply@thebroersmas.com  (after domain verification in Resend)

services:
  - type: web
    name: vap-admin
    env: python
    region: frankfurt
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python3 admin_server.py

    disk:
      name: vap-admin-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: TENANTS_FILE
        value: /data/tenants.json
      # PORT is injected automatically by Render — do not set it here.
      # All secret env vars are set manually in the Render dashboard.

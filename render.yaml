# Render.com deployment configuration
# https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push this folder to a GitHub repository.
#   2. Go to https://dashboard.render.com → New → Blueprint.
#   3. Connect the repository — Render reads this file automatically.
#   4. Click "Apply". The service and disk are created in ~2 minutes.
#   5. Your public URL appears in the Render dashboard (e.g. https://church-election.onrender.com).
#   6. Open that URL in the admin's browser and proceed with Election Setup.

services:
  - type: web
    name: church-election
    env: python
    region: frankfurt           # change to: oregon, ohio, singapore, etc.
    plan: free                  # free plan — spins down after 15 min inactivity
    buildCommand: echo "No build step required"
    startCommand: python3 server.py

    # Persistent disk — keeps election_state.json across restarts and deploys.
    # NOTE: Persistent disks require the Starter plan ($7/month) on Render.
    # On the free plan, data is lost when the service restarts.
    # For a one-day election on the free plan, this is acceptable as long as
    # you do not redeploy or the service does not restart mid-election.
    disk:
      name: election-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: STATE_FILE
        value: /data/election_state.json
      # PORT is injected automatically by Render — do not set it here.
